<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">  
<title>Bia & Dani</title>

<link rel="stylesheet" href="css/style.css">

</head>

<div class="language-switch">

<button class="lang-btn active" data-lang="es">ES</button>
<button class="lang-btn" data-lang="pt">PT</button>

</div>

<body>

<div id="intro">

<video id="introVideo" preload="auto" playsinline>
<source src="media/CartaOpen.mp4" type="video/mp4">
</video>

<p class="open-text">Toca para abrir la invitación</p>

</div>

<div id="website"> 

<section class="hero">

<p class="hero-top">

<span data-lang-text="es">Nos casamos</span>
<span data-lang-text="pt" style="display:none;">Vamos nos casar</span>

</p>

<h1 class="hero-names">
Bianca
<span class="amp">&</span>
Daniel
</h1>

<p class="hero-date">
07 · 11 · 2026
</p>

<div class="scroll-indicator">
↓
</div>

</section>

<section class="countdown">

<h2>Cuenta atrás para el gran díaaa</h2>

<div class="countdown-container">

<div class="time-box">
<span id="days">0</span>
<p>días</p>
</div>

<div class="time-box">
<span id="hours">0</span>
<p>horas</p>
</div>

<div class="time-box">
<span id="minutes">0</span>
<p>min</p>
</div>

<div class="time-box">
<span id="seconds">0</span>
<p>seg</p>
</div>

</div>

</section>

<section class="evento">

<h2>El evento</h2>

<div class="evento-info">

<div class="evento-item">
<h3>Ceremonia</h3>
<p>7 de noviembre de 2026</p>
<p>16:00</p>
<p>Alicante, España</p>
</div>

</div>

<div class="mapa">

<iframe
src="https://www.google.com/maps?q=alicante&output=embed"
width="100%"
height="350"
style="border:0;"
allowfullscreen=""
loading="lazy">
</iframe>

</div>

</section>  

<script src="js/script.js"></script>

</div> 

</body>

</html>
